name: AI BugHunter Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Main Code (Public)
      uses: actions/checkout@v4

    - name: 2. Checkout Private Data (The Vault)
      uses: actions/checkout@v4
      with:
        repository: abdelrhmansleem998-sketch/bughunter-data # ⚠️ تأكد إن ده اسم المستودع السري بتاعك
        token: ${{ secrets.DATA_PAT }}
        path: vault # هيحط الداتا كلها في فولدر اسمه vault

    - name: Set up Go & Python
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies & Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y jq whois dnsutils
        go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
        go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
        go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
        go install -v github.com/projectdiscovery/tlsx/cmd/tlsx@latest
        go install -v github.com/tomnomnom/waybackurls@latest
        go install -v github.com/lc/subjs@latest
        ~/go/bin/nuclei -update-templates
        pip install -r requirements.txt

    - name: Prepare Data Folders
      run: |
        # نسخ الأهداف والداتابيز من الخزنة لبيئة العمل
        cp vault/targets.txt .
        mkdir -p data
        cp vault/findings.db data/ || true

    - name: Run Recon & Scan Pipeline
      env:
        PATH: ${{ env.PATH }}:/home/runner/go/bin
      run: |
        python scripts/recon.py
        python scripts/scan.py
        python scripts/diff.py

    - name: Run AI Analysis & Discord Report
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python scripts/analyze.py
        python scripts/report.py

    - name: Save Data back to Private Vault
      run: |
        # إرجاع الداتابيز المحدثة للخزنة السرية
        cp data/findings.db vault/
        cd vault
        git config --global user.name "BugHunter Bot"
        git config --global user.email "bot@bughunter.local"
        git add findings.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update findings database" && git push)
